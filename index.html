<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>DIMINZI SOCCER APP</title>
<meta name="theme-color" content="#0D0D0D" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="assets/icon-192.png" />
<link rel="apple-touch-icon" href="assets/icon-192.png" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-diminzi">DIMINZI</span><span class="brand-soccer">SOCCER</span>
  </div>
  <div class="status-dot" id="apiStatus" title="API status"></div>
</header>

<nav class="tabbar" id="tabbar">
  <button class="tab active" data-tab="fixtures">Fixtures</button>
  <button class="tab" data-tab="stats">Stats</button>
  <button class="tab" data-tab="predict">Predict</button>
  <button class="tab" data-tab="leaderboard">Leaderboard</button>
</nav>

<main id="app">

  <section id="fixtures" class="tab-panel active">
    <div class="section-header">
      <h2>Today's Matches</h2>
      <div class="filter-row">
        <button class="chip active" data-filter="all">All</button>
        <button class="chip" data-filter="live">Live</button>
        <button class="chip" data-filter="finished">Finished</button>
        <button class="chip" data-filter="upcoming">Upcoming</button>
      </div>
    </div>
    <div id="fixturesList" class="list"></div>
  </section>

  <section id="stats" class="tab-panel">
    <div class="section-header">
      <h2>Match Stats</h2>
      <p class="hint">Tap a match in Fixtures to view its stats here.</p>
    </div>
    <div id="statsContent" class="card"></div>
  </section>

  <section id="predict" class="tab-panel">
    <div class="section-header">
      <h2>Your Predictions</h2>
      <p class="hint">Exact score = 3 pts &middot; Correct winner/draw = 1 pt</p>
    </div>
    <div id="predictList" class="list"></div>
  </section>

  <section id="leaderboard" class="tab-panel">
    <div class="section-header">
      <h2>Leaderboard</h2>
    </div>
    <div id="leaderboardList" class="list"></div>
    <div class="name-prompt" id="namePrompt" style="display:none;">
      <input type="text" id="userNameInput" placeholder="Enter your name to join leaderboard" maxlength="20" />
      <button id="saveNameBtn">Save</button>
    </div>
  </section>

</main>

<div id="matchModal" class="modal">
  <div class="modal-content">
    <button class="modal-close" id="modalClose">&times;</button>
    <div id="modalBody"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
